<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            max-width: 680px;
            margin: 80px auto;
            padding: 24px;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.5;
        }
        h1 {
            font-size: 32px;
            margin: 0 0 4px;
            font-weight: 600;
        }
        p.subtitle {
            color: #8b949e;
            margin: 0 0 32px;
            font-size: 14px;
        }
        .form-row {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        input[type="url"] {
            flex: 1;
            padding: 12px 14px;
            font-size: 15px;
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.15s;
        }
        input[type="url"]:focus {
            border-color: #58a6ff;
        }
        button {
            padding: 12px 22px;
            font-size: 15px;
            font-weight: 600;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover:not(:disabled) { background: #2ea043; }
        button:disabled { background: #30363d; cursor: not-allowed; opacity: 0.7; }
        .result, .error {
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            border: 1px solid #30363d;
            background: #161b22;
            font-size: 14px;
        }
        .result a {
            color: #58a6ff;
            text-decoration: none;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        }
        .result a:hover { text-decoration: underline; }
        .error { border-color: #f85149; color: #f85149; }
        .copy-btn {
            padding: 4px 10px;
            font-size: 12px;
            background: #30363d;
            margin-left: 8px;
        }
        .copy-btn:hover:not(:disabled) { background: #484f58; }
        .recent {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid #30363d;
        }
        .recent h2 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
            margin-bottom: 12px;
        }
        .recent-item {
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid #21262d;
        }
        .recent-item:last-child { border-bottom: none; }
        .recent-item a {
            color: #58a6ff;
            text-decoration: none;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        }
        .recent-item .original {
            color: #6e7681;
            font-size: 12px;
            margin-top: 2px;
            word-break: break-all;
        }
        footer {
            margin-top: 48px;
            text-align: center;
            font-size: 12px;
            color: #6e7681;
        }
        footer a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1>🔗 URL Shortener</h1>
    <p class="subtitle">.NET 9 · PostgreSQL · Redis · async analytics</p>

    <form id="shortenForm">
        <div class="form-row">
            <input type="url" id="longUrl" placeholder="https://example.com/your/very/long/url" required autofocus>
            <button type="submit" id="submitBtn">Shorten</button>
        </div>
    </form>

    <div id="message"></div>

    <div class="recent" id="recent" style="display:none">
        <h2>Recent (this session)</h2>
        <div id="recentList"></div>
    </div>

    <footer>
        <a href="/health">/health</a> ·
        <a href="https://github.com/Deepak619261/URL-shortner" target="_blank">source on GitHub</a>
    </footer>

    <script>
        const form = document.getElementById('shortenForm');
        const longUrlInput = document.getElementById('longUrl');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        const recentSection = document.getElementById('recent');
        const recentList = document.getElementById('recentList');
        const recentItems = [];

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const longUrl = longUrlInput.value.trim();
            if (!longUrl) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Shortening...';
            messageDiv.innerHTML = '';

            try {
                const res = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ longUrl })
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`HTTP ${res.status}: ${errText || res.statusText}`);
                }

                const data = await res.json();
                showResult(data);
                addToRecent(data, longUrl);
                longUrlInput.value = '';
            } catch (err) {
                messageDiv.innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Shorten';
            }
        });

        function showResult(data) {
            messageDiv.innerHTML = `
                <div class="result">
                    <a href="${escapeHtml(data.shortUrl)}" target="_blank">${escapeHtml(data.shortUrl)}</a>
                    <button class="copy-btn" onclick="copyToClipboard('${escapeJs(data.shortUrl)}', this)">Copy</button>
                </div>
            `;
        }

        function addToRecent(data, originalUrl) {
            recentItems.unshift({ ...data, originalUrl });
            if (recentItems.length > 10) recentItems.pop();
            recentSection.style.display = 'block';
            recentList.innerHTML = recentItems.map(item => `
                <div class="recent-item">
                    <a href="${escapeHtml(item.shortUrl)}" target="_blank">${escapeHtml(item.shortCode)}</a>
                    <div class="original">${escapeHtml(item.originalUrl.length > 70 ? item.originalUrl.slice(0, 70) + '…' : item.originalUrl)}</div>
                </div>
            `).join('');
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = orig, 1200);
            });
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }
        function escapeJs(s) {
            return String(s).replace(/[\\']/g, '\\$&');
        }
    </script>
</body>
</html>
